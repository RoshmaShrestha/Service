<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">

  <!-- Background rounded square -->
  <rect x="20" y="20" width="360" height="360" rx="80" fill="#1e40af"/>

  <!-- Orbit dashed ring -->
  <circle cx="200" cy="200" r="105" fill="none" stroke="#dbeafe" stroke-width="5" stroke-dasharray="14 10"/>

  <!-- Center white circle -->
  <circle cx="200" cy="200" r="48" fill="#ffffff"/>

  <!-- Center S letter -->
  <text x="200" y="222" text-anchor="middle" font-size="54" font-weight="700" fill="#1e40af" font-family="Arial, sans-serif">S</text>

  <!-- TOP NODE: Laptop (Freelance) -->
  <circle cx="200" cy="78" r="34" fill="#dbeafe"/>
  <!-- laptop screen -->
  <rect x="183" y="63" width="34" height="22" rx="4" fill="#1e40af"/>
  <!-- laptop base -->
  <rect x="178" y="85" width="44" height="6" rx="3" fill="#1e40af"/>

  <!-- BOTTOM-LEFT NODE: House (Home Services) -->
  <circle cx="105" cy="268" r="34" fill="#dbeafe"/>
  <!-- roof -->
  <polygon points="105,248 128,263 82,263" fill="#1e40af"/>
  <!-- walls -->
  <rect x="88" y="263" width="34" height="26" rx="2" fill="#1e40af"/>
  <!-- door -->
  <rect x="99" y="271" width="12" height="18" rx="2" fill="#dbeafe"/>

  <!-- BOTTOM-RIGHT NODE: Briefcase (B2B) -->
  <circle cx="295" cy="268" r="34" fill="#dbeafe"/>
  <!-- briefcase body -->
  <rect x="275" y="261" width="40" height="28" rx="5" fill="#1e40af"/>
  <!-- briefcase handle -->
  <rect x="285" y="253" width="20" height="10" rx="4" fill="none" stroke="#1e40af" stroke-width="4"/>
  <!-- briefcase middle line -->
  <line x1="275" y1="275" x2="315" y2="275" stroke="#dbeafe" stroke-width="3"/>

</svg>
